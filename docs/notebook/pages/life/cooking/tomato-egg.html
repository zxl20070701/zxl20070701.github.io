<header>
    番茄炒蛋
</header>
<p>
    制作时间：15分钟
</p>
<h2>
    食材
</h2>
<p>
    （约2~3人份）番茄 3个、鸡蛋 4个、葱 1根、盐 适量、糖 5克、食用油 适量。
</p>
<h2>
    做法
</h2>
<p>
    ① 番茄洗净切块，葱切葱花；鸡蛋打散，加少许盐搅拌均匀。
</p>
<p>
    ② 锅中倒油烧热，倒入蛋液，中火炒至凝固但保持嫩滑，盛出备用。
</p>
<p>
    ③ 锅中再加少许油，下番茄块翻炒，加少许盐帮助番茄出水。
</p>
<p>
    ④ 番茄炒软出汁后，加入糖和炒好的鸡蛋，翻炒均匀。
</p>
<p>
    ⑤ 最后撒上葱花，翻炒几下即可出锅。
</p>
<h2>
    经验
</h2>
<p>
    番茄选择成熟但不太软的，炒出来口感更好。鸡蛋不要炒太老，保持嫩滑。喜欢汤汁多的可以加少许水一起炒。番茄炒蛋看似简单，但要掌握好火候，番茄要炒出汁水但不烂，鸡蛋要嫩滑不老。
</p>
