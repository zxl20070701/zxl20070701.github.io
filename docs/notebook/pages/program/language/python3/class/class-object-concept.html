<header>
    类与对象概念
</header>
<h2>
    什么是类与对象？
</h2>
<p>
    在Python中，<span class="important">类（Class）</span>是创建对象的蓝图或模板，而<span class="important">对象（Object）</span>是类的实例。类定义了一组属性（数据）和方法（函数），对象则根据这些定义创建并拥有自己的具体值。
</p>

<h2>
    核心概念
</h2>
<ul>
    <li><strong>类（Class）</strong>：定义对象的属性和行为的模板</li>
    <li><strong>对象（Object）</strong>：类的具体实例，拥有类定义的属性和方法</li>
    <li><strong>实例（Instance）</strong>：对象的另一种称呼，强调是类的具体实现</li>
</ul>

<h2>
    类比理解
</h2>
<p>
    可以将类想象成建筑设计图纸，而对象就是根据这张图纸建造的具体房屋。同一张图纸可以建造多个相似的房屋，每个房屋都有自己的地址（内存地址）和居住者（属性值）。
</p>
