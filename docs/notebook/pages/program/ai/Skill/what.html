<header>
    什么是Skill（技能）
</header>
<p>
    专注于定义和封装AI智能体的具体能力，如数据分析、图像识别、文本生成等。每个Skill都是一个独立的、可重用的组件，可以被智能体动态加载和调用以完成特定任务。
</p>
<p>
    可以将Skill想象成AI智能体的"工具箱"。正如工匠使用不同的工具来完成不同的工作一样，AI智能体通过组合和使用不同的Skill来完成复杂的任务。Skill的设计遵循模块化原则，使得智能体可以根据任务需求灵活地选择和组合不同的技能。
</p>
<p>
    Skill 的核心就是：一个文件夹 + 一个 SKILL.md 文件。
</p>
