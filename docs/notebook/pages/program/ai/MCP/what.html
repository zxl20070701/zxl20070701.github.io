<header>
    什么是MCP（Model Context Protocol）
</header>
<p>
    一个开源标准，用于连接AI应用程序与外部系统。使用MCP，AI应用程序（如Claude或ChatGPT）可以连接到数据源（例如本地文件、数据库）、工具（例如搜索引擎、计算器）和工作流程（例如专门的提示），使它们能够访问关键信息并执行任务。
</p>
<p>
    可以将MCP想象成AI应用程序的USB-C端口。正如USB-C为连接电子设备提供了标准化方式一样，MCP为连接AI应用程序与外部系统提供了标准化方式。
</p>
