<header>
    tf.add
</header>
<h2>
    语法
</h2>
<pre tag="javascript">
    tf.add(a, b)
</pre>
<p>
    逐元素相加两个张量。
</p>
<h3>
    a
</h3>
<p>
    第一个张量。
</p>
<h3>
    b
</h3>
<p>
    第二个张量。
</p>
<h2>
    示例
</h2>
<pre tag="javascript">
const a = tf.tensor1d([1, 2, 3, 4]);
const b = tf.tensor1d([10, 20, 30, 40]);
a.add(b).print(); // 或 tf.add(a, b).print();
</pre>
<p>
    输出：
</p>
<pre>
[11, 22, 33, 44]
</pre>
