<header ui-dragdrop:desktop>
    <div class="win-btns">
        <button class="min" ui-on:click.stop="$minView">最小化</button>
        <button class="close" ui-on:click.stop="$closeView">关闭</button>
    </div>
    <h2>
        时序图
    </h2>
</header>
<div class="toolbar">
    <div class="tool-group">
        <label>工具:</label>
        <button ui-bind:class="'tool-btn ' + (currentTool === 'select' ? 'active' : '')" data-tool="select"
            ui-on:click="setTool">
            <i class="icon-select"></i> 选择
        </button>
        <button ui-bind:class="'tool-btn ' + (currentTool === 'participant' ? 'active' : '')" data-tool="participant"
            ui-on:click="setTool">
            <i class="icon-participant"></i> 参与者
        </button>
        <button ui-bind:class="'tool-btn ' + (currentTool === 'message' ? 'active' : '')" data-tool="message"
            ui-on:click="setTool">
            <i class="icon-message"></i> 消息
        </button>
        <button ui-bind:class="'tool-btn ' + (currentTool === 'activation' ? 'active' : '')" data-tool="activation"
            ui-on:click="setTool">
            <i class="icon-activation"></i> 激活期
        </button>
        <button ui-bind:class="'tool-btn ' + (currentTool === 'note' ? 'active' : '')" data-tool="note"
            ui-on:click="setTool">
            <i class="icon-note"></i> 注释
        </button>
    </div>
    <div class="tool-group" ui-show="currentTool === 'message'">
        <label>消息类型:</label>
        <button ui-bind:class="'tool-btn ' + (currentMessageType === 'sync' ? 'active' : '')" data-type="sync"
            ui-on:click="setMessageType">
            同步
        </button>
        <button ui-bind:class="'tool-btn ' + (currentMessageType === 'async' ? 'active' : '')" data-type="async"
            ui-on:click="setMessageType">
            异步
        </button>
        <button ui-bind:class="'tool-btn ' + (currentMessageType === 'return' ? 'active' : '')" data-type="return"
            ui-on:click="setMessageType">
            返回
        </button>
    </div>
    <div class="tool-group">
        <label>颜色:</label>
        <div class="color-palette">
            <div ui-bind:class="'color-item ' + (currentColor === '#000000' ? 'active' : '')"
                style="background-color: #000000" data-value="#000000" ui-on:click="setColor">
            </div>
            <div ui-bind:class="'color-item ' + (currentColor === '#FF0000' ? 'active' : '')"
                style="background-color: #FF0000" data-value="#FF0000" ui-on:click="setColor">
            </div>
            <div ui-bind:class="'color-item ' + (currentColor === '#00FF00' ? 'active' : '')"
                style="background-color: #00FF00" data-value="#00FF00" ui-on:click="setColor">
            </div>
            <div ui-bind:class="'color-item ' + (currentColor === '#0000FF' ? 'active' : '')"
                style="background-color: #0000FF" data-value="#0000FF" ui-on:click="setColor">
            </div>
            <div ui-bind:class="'color-item ' + (currentColor === '#FFFF00' ? 'active' : '')"
                style="background-color: #FFFF00" data-value="#FFFF00" ui-on:click="setColor">
            </div>
            <div ui-bind:class="'color-item ' + (currentColor === '#FF00FF' ? 'active' : '')"
                style="background-color: #FF00FF" data-value="#FF00FF" ui-on:click="setColor">
            </div>
            <div ui-bind:class="'color-item ' + (currentColor === '#00FFFF' ? 'active' : '')"
                style="background-color: #00FFFF" data-value="#00FFFF" ui-on:click="setColor">
            </div>
        </div>
    </div>
    <div class="tool-group">
        <label>样式:</label>
        <select ui-bind:value="currentLineWidth" ui-on:change="setLineWidth">
            <option value="1">1px</option>
            <option value="2">2px</option>
            <option value="3">3px</option>
            <option value="4">4px</option>
            <option value="5">5px</option>
        </select>
    </div>
    <div class="tool-group">
        <button class="delete-btn" ui-on:click="deleteSelected">
            <i class="icon-delete"></i> 删除选中
        </button>
        <button class="clear-btn" ui-on:click="clearCanvas">
            <i class="icon-clear"></i> 清空画布
        </button>
    </div>
    <div class="tool-group">
        <label>画布大小:</label>
        <input type="number" ui-bind:value="canvasWidth" ui-on:input="setCanvasWidth" min="100" max="3000"
            style="width: 60px;">
        <span>×</span>
        <input type="number" ui-bind:value="canvasHeight" ui-on:input="setCanvasHeight" min="100" max="2000"
            style="width: 60px;">
    </div>
    <div class="tool-group">
        <button class="save-btn" ui-on:click="saveCanvas">
            <i class="icon-save"></i> 保存图片
        </button>
        <button class="export-btn" ui-on:click="saveData">
            <i class="icon-export"></i> 导出数据
        </button>
        <button class="import-btn" ui-on:click="openData">
            <i class="icon-import"></i> 导入数据
        </button>
    </div>
</div>
<div class="content">
    <canvas ui-bind:style="'width: ' + canvasWidth + 'px; height: ' + canvasHeight + 'px;'"
        ref="mycanvas">非常抱歉，您的浏览器不支持canvas!</canvas>
</div>
