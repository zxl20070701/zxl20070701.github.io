<header ui-dragdrop:desktop>
    <div class="win-btns">
        <button class="min" ui-on:click.stop="$minView">最小化</button>
        <button class="close" ui-on:click.stop="$closeView">关闭</button>
    </div>
    <h2>
        简历制作
    </h2>
</header>
<div class="resume-container">
    <div class="resume-editor">
        <div class="editor-section">
            <h3>个人信息</h3>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="name" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>职位</label>
                <input type="text" id="position" placeholder="请输入应聘职位">
            </div>
            <div class="form-group">
                <label>电话</label>
                <input type="text" id="phone" placeholder="请输入联系电话">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱地址">
            </div>
            <div class="form-group">
                <label>WebSite</label>
                <input type="text" id="website" placeholder="请输入WebSite链接">
            </div>
            <div class="form-group">
                <label>个人简介</label>
                <textarea id="summary" placeholder="请输入个人简介"></textarea>
            </div>
        </div>

        <div class="editor-section">
            <h3>教育经历 <button class="add-btn" id="add-education">+ 添加</button></h3>
            <div id="education-list"></div>
        </div>

        <div class="editor-section">
            <h3>工作经历 <button class="add-btn" id="add-work">+ 添加</button></h3>
            <div id="work-list"></div>
        </div>

        <div class="editor-section">
            <h3>技能展示 <button class="add-btn" id="add-skill">+ 添加</button></h3>
            <div id="skill-list"></div>
        </div>

        <div class="editor-section">
            <h3>项目经历 <button class="add-btn" id="add-project">+ 添加</button></h3>
            <div id="project-list"></div>
        </div>
    </div>

    <div class="resume-preview">
        <div class="preview-content" id="resume-preview">
            <div class="resume-layout">
                <!-- 左侧栏：个人信息和技能 -->
                <div class="resume-sidebar">
                    <div class="sidebar-header">
                        <h1 id="preview-name">姓名</h1>
                        <p id="preview-position">应聘职位</p>
                        <div class="contact-info">
                            <div class="contact-item">
                                <span>📞</span>
                                <span id="preview-phone">电话</span>
                            </div>
                            <div class="contact-item">
                                <span>✉️</span>
                                <span id="preview-email">邮箱</span>
                            </div>
                            <div class="contact-item">
                                <span>🔗</span>
                                <span id="preview-website">WebSite</span>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <h3>个人简介</h3>
                        <p id="preview-summary">个人简介内容...</p>
                    </div>

                    <div class="sidebar-section">
                        <h3>技能展示</h3>
                        <div id="preview-skills"></div>
                    </div>
                </div>

                <!-- 右侧栏：主要内容 -->
                <div class="resume-main">
                    <div class="main-section experience-section">
                        <h3>教育经历</h3>
                        <div id="preview-education" class="experience-list"></div>
                    </div>

                    <div class="main-section experience-section">
                        <h3>工作经历</h3>
                        <div id="preview-work" class="experience-list"></div>
                    </div>

                    <div class="main-section experience-section">
                        <h3>项目经历</h3>
                        <div id="preview-projects" class="experience-list"></div>
                    </div>
                </div>
            </div>
        </div>
        <input type="file" id="daoru-file" accept=".json" style="display: none;">
        <div class="daochu-buttons">
            <button class="daochu-pdf-btn" id="daochu-pdf-resume">
                导出PDF
            </button>
            <button class="daoru-btn" id="daoru-resume">
                导入简历
            </button>
            <button class="daochu-btn" id="daochu-resume">
                导出简历
            </button>
        </div>
    </div>
</div>
